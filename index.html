<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intellar Monitor</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #1a1a1a; color: #fff; margin: 0; padding: 20px; }
        h1 { margin-bottom: 30px; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; max-width: 800px; margin: 0 auto; }
        .card { background: #2d2d2d; padding: 20px; border-radius: 12px; width: 140px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .indicator { width: 24px; height: 24px; border-radius: 50%; margin-bottom: 10px; transition: all 0.3s; background: #444; border: 2px solid #555; }
        .indicator.on { background: #00e676; box-shadow: 0 0 15px #00e676; border-color: #00e676; }
        .indicator.off { background: #ff1744; box-shadow: 0 0 5px #ff1744; border-color: #ff1744; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #2979ff; color: white; border: none; border-radius: 8px; margin-bottom: 20px; transition: background 0.2s; }
        button:hover { background: #2962ff; }
        button:disabled { background: #555; cursor: not-allowed; }
        #statusText { margin-bottom: 20px; color: #aaa; font-style: italic; }
        .fps { font-size: 12px; color: #888; margin-top: 5px; }
        .controls { margin-top: 30px; border-top: 1px solid #444; padding-top: 20px; width: 100%; max-width: 800px; }
        .char-grid { display: flex; gap: 20px; justify-content: center; margin-top: 20px; }
        .char-card {
            width: 120px; height: 140px;
            background: #2d2d2d; border: 2px solid #555; border-radius: 12px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s;
        }
        .char-card:hover { background: #3d3d3d; border-color: #2979ff; transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .char-card.active {
            border-color: #00e676;
            background: #2a3b2a;
            box-shadow: 0 0 15px rgba(0, 230, 118, 0.4);
        }
        .char-card canvas { width: 100px; height: 100px; border-radius: 8px; margin-bottom: 5px; display: none; }
        .char-card .placeholder { width: 100px; height: 100px; background: #222; border: 1px solid #444; border-radius: 8px; margin-bottom: 5px; }
        .char-card span { font-size: 16px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Intellar Engine Monitor</h1>
    
    <button id="btConnect">Connexion Bluetooth</button>
    <div id="statusText">En attente de connexion...</div>

    <!-- Conteneur vidé, sera rempli par JS -->
    <div class="container" id="indicatorsContainer"></div>

    <div class="controls">
        <h2>Changer de Personnage</h2>
        <div class="char-grid" id="charGrid">
            <!-- Généré dynamiquement -->
            <div style="color:#888;">Connectez le Bluetooth...</div>
        </div>
    </div>

    <script>
        // UUIDs doivent correspondre EXACTEMENT à ceux définis dans Bluetooth.cpp
        const SERVICE_UUID = "590d65c7-3a0a-4023-a05a-6aaf2f22441c";
        const CHAR_UUID    = "0f0394c8-3162-42da-a0f5-5b0907106037";
        
        let bluetoothDevice;
        let btCharacteristic; // Variable pour stocker la connexion d'écriture
        
        // Variables pour la réception d'image
        let imgBuffer = null;
        let imgBufferIdx = 0;
        let currentPreviewId = -1;
        
        // Définition des composants possibles pour la génération dynamique
        const COMPONENTS_DEF = {
            oled: { label: "OLED", fpsId: "fps_oled" },
            lcd_l: { label: "LCD Gauche", fpsId: "fps_lcd_l" },
            lcd_r: { label: "LCD Droit", fpsId: "fps_lcd_r" },
            touch: { label: "Tactile" },
            imu: { label: "IMU (Gyro)" },
            tof: { label: "ToF (Distance)" },
            touchpad: { label: "Touchpad" }
        };

        document.getElementById('btConnect').addEventListener('click', async () => {
            try {
                document.getElementById('statusText').innerText = "Recherche du périphérique...";
                
                // 1. Demander à l'utilisateur de choisir le périphérique
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: [SERVICE_UUID] }] // Filtre par notre Service UUID
                });

                bluetoothDevice = device;
                bluetoothDevice.addEventListener('gattserverdisconnected', onDisconnected);

                // 2. Se connecter au serveur GATT
                document.getElementById('statusText').innerText = "Connexion en cours...";
                const server = await device.gatt.connect();

                // 3. Récupérer le service et la caractéristique
                const service = await server.getPrimaryService(SERVICE_UUID);
                const characteristic = await service.getCharacteristic(CHAR_UUID);
                btCharacteristic = characteristic; // Sauvegarde pour utilisation ultérieure

                // 4. Activer les notifications
                await characteristic.startNotifications();
                characteristic.addEventListener('characteristicvaluechanged', handleNotifications);

                document.getElementById('statusText').innerText = "Connecté à " + device.name;
                document.getElementById('btConnect').disabled = true;

                // 5. Demander la liste des fichiers disponibles
                setTimeout(() => sendCommand('99'), 500); 

            } catch (error) {
                console.error(error);
                document.getElementById('statusText').innerText = "Erreur: " + error;
            }
        });

        function handleNotifications(event) {
            const value = event.target.value;
            const decoder = new TextDecoder('utf-8');
            
            // DÉTECTION IMAGE BINAIRE (Header: I M G 0 120 120)
            if (value.byteLength > 3 && value.getUint8(0) === 73 && value.getUint8(1) === 77 && value.getUint8(2) === 71) {
                const id = value.getUint8(3); // Lecture de l'ID
                const w = value.getUint8(4);
                const h = value.getUint8(5);
                console.log(`Reception image ID:${id} ${w}x${h}`);
                // Préparation du buffer (RGB565 = 2 bytes per pixel)
                imgBuffer = new Uint8Array(w * h * 2);
                imgBufferIdx = 0;
                currentPreviewId = id; // On mémorise l'ID pour ce transfert
                return;
            }

            // ACCUMULATION DONNÉES IMAGE
            if (imgBuffer !== null) {
                const chunk = new Uint8Array(value.buffer);
                if (imgBufferIdx + chunk.length <= imgBuffer.length) {
                    imgBuffer.set(chunk, imgBufferIdx);
                    imgBufferIdx += chunk.length;
                    
                    // Image complète reçue
                    if (imgBufferIdx >= imgBuffer.length) {
                        renderPreview(imgBuffer, 120, 120, currentPreviewId);
                        imgBuffer = null;
                    }
                    return;
                }
            }

            // DÉTECTION JSON
            const jsonString = decoder.decode(value);
            
            try {
                // Si ça ne ressemble pas à du JSON, on ignore (paquet binaire perdu ?)
                if (!jsonString.startsWith('{')) return;

                const data = JSON.parse(jsonString);
                
                // RECEPTION CONFIGURATION INITIALE
                if (data.config) {
                    const container = document.getElementById('indicatorsContainer');
                    container.innerHTML = ""; // Reset
                    
                    for (const [key, enabled] of Object.entries(data.config)) {
                        if (enabled && COMPONENTS_DEF[key]) {
                            const def = COMPONENTS_DEF[key];
                            const fpsHtml = def.fpsId ? `<div id="${def.fpsId}" class="fps">-- FPS</div>` : '';
                            
                            const card = document.createElement('div');
                            card.className = 'card';
                            card.innerHTML = `<div id="${key}" class="indicator"></div><span>${def.label}</span>${fpsHtml}`;
                            container.appendChild(card);
                        }
                    }
                }

                // Réception de la liste des fichiers
                if (data.files) {
                    const grid = document.getElementById('charGrid');
                    grid.innerHTML = ""; // Vider la liste
                    
                    data.files.forEach(f => {
                        // Nettoyage du nom : /expression-monkey-5... -> Monkey
                        let cleanName = f.name.replace(/^\//, '').replace(/^expression-/, '').split('-')[0];
                        cleanName = cleanName.charAt(0).toUpperCase() + cleanName.slice(1);
                        
                        const div = document.createElement('div');
                        div.className = 'char-card';
                        div.dataset.face = f.id;
                        div.onclick = () => sendCommand(String(f.id));
                        // Ajouter ID au canvas pour le cibler plus tard
                        div.innerHTML = `
                            <div class="placeholder" id="icon-${f.id}"></div>
                            <canvas id="cvs-${f.id}" width="120" height="120"></canvas>
                            <span>${cleanName}</span>
                        `;
                        grid.appendChild(div);

                        // Demander la miniature après un court délai
                        setTimeout(() => {
                            sendCommand(String(200 + (f.id - 10))); // 200 + index
                        }, 500 + (f.id - 10) * 2000); // Échelonner les demandes
                    });
                }

                // Mise à jour de la sélection de personnage
                if (data.face !== undefined) {
                    document.querySelectorAll('.char-card').forEach(el => {
                        if (el.dataset.face == data.face) el.classList.add('active');
                        else el.classList.remove('active');
                    });
                }

                // Met à jour chaque indicateur basé sur les clés JSON (oled, lcd_l, etc.)
                for (const [key, val] of Object.entries(data)) {
                    const el = document.getElementById(key);
                    if (el) {
                        if (key.startsWith('fps_')) {
                            el.innerText = val + ' FPS';
                        } else {
                            el.className = 'indicator ' + (val ? 'on' : 'off');
                        }
                    }
                }
            } catch (e) { console.error("JSON invalide", e); }
        }

        function renderPreview(buffer, width, height, id) {
            const cvs = document.getElementById('cvs-' + id);
            const icon = document.getElementById('icon-' + id);
            if (!cvs) return;

            const ctx = cvs.getContext('2d');
            const imgData = ctx.createImageData(width, height);
            const data = imgData.data;
            const u16 = new Uint16Array(buffer.buffer);

            for (let i = 0; i < u16.length; i++) {
                let pixel = u16[i];
                // RGB565 conversion
                // (Attention au boutisme, ici on suppose que c'est reçu tel quel)
                let r = (pixel >> 11) & 0x1F;
                let g = (pixel >> 5) & 0x3F;
                let b = pixel & 0x1F;
                data[i*4] = (r * 255 / 31);
                data[i*4+1] = (g * 255 / 63);
                data[i*4+2] = (b * 255 / 31);
                data[i*4+3] = 255;
            }
            ctx.putImageData(imgData, 0, 0);
            cvs.style.display = 'block';
            if(icon) icon.style.display = 'none';
        }

        function onDisconnected(event) {
            document.getElementById('statusText').innerText = "Déconnecté.";
            document.getElementById('btConnect').disabled = false;
            btCharacteristic = null;
            document.querySelectorAll('.indicator').forEach(el => el.className = 'indicator');
        }

        async function sendCommand(cmd) {
            if (!btCharacteristic) {
                alert("Non connecté !");
                return;
            }
            const encoder = new TextEncoder();
            await btCharacteristic.writeValue(encoder.encode(cmd));
        }
    </script>
</body>
</html>
